<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a2828;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#371e1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a1414;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="charcoalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#726e68;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#55514c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="burgundyGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer glow -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="#371e1e" stroke-width="3" opacity="0.2"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="#371e1e" stroke-width="1" opacity="0.1"/>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#accentGrad)" stroke-width="1" opacity="0.15"/>
  
  <!-- Cross symbol (nurse) -->
  <g transform="translate(200, 125)" filter="url(#burgundyGlow)">
    <rect x="-8" y="-40" width="16" height="80" rx="3" fill="url(#accentGrad)"/>
    <rect x="-40" y="-8" width="80" height="16" rx="3" fill="url(#accentGrad)"/>
    <!-- Charcoal outline -->
    <rect x="-8" y="-40" width="16" height="80" rx="3" fill="none" stroke="url(#charcoalGrad)" stroke-width="1.5" opacity="0.5"/>
    <rect x="-40" y="-8" width="80" height="16" rx="3" fill="none" stroke="url(#charcoalGrad)" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- Needle/ink drop (tattoo) -->
  <g transform="translate(200, 245)">
    <path d="M0,-40 L0,25" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M0,25 L-10,50 L0,44 L10,50 Z" fill="url(#charcoalGrad)"/>
    <path d="M0,25 L-10,50 L0,44 L10,50 Z" fill="none" stroke="url(#accentGrad)" stroke-width="1" opacity="0.4"/>
    <circle cx="0" cy="62" r="7" fill="url(#accentGrad)" opacity="0.8"/>
    <circle cx="0" cy="62" r="7" fill="none" stroke="url(#charcoalGrad)" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="78" r="4" fill="#371e1e" opacity="0.5"/>
    <circle cx="0" cy="90" r="2" fill="#2a1414" opacity="0.3"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="200" cy="55" r="3" fill="url(#accentGrad)" opacity="0.4"/>
  <circle cx="200" cy="345" r="3" fill="url(#accentGrad)" opacity="0.4"/>
  <circle cx="55" cy="200" r="3" fill="url(#charcoalGrad)" opacity="0.4"/>
  <circle cx="345" cy="200" r="3" fill="url(#charcoalGrad)" opacity="0.4"/>
</svg>
